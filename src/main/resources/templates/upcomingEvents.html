<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upcoming Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                    },
                    colors: {
                        ink: '#0f172a',      // dark text
                        mute: '#475569',     // muted
                        paper: '#fafafa',    // background
                        accent: '#111827'    // lines/accents
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-paper text-ink antialiased">
<div th:replace="~{fragments/header :: header}"></div>

<main class="min-h-screen px-4 py-10">
    <section class="w-full max-w-4xl mx-auto">
        <h1 class="font-serif text-center text-3xl md:text-4xl font-bold mb-4">Your Events</h1>
        <p class="text-center text-mute mb-8">Here is a list of all your created events.</p>

        <ul class="space-y-6">
            <li th:each="event : ${events}"
                class="bg-white rounded-2xl shadow-sm ring-1 ring-black/5 p-6 sm:p-8 hover:shadow-md transition-shadow">
                <div class="flex flex-col sm:flex-row justify-between">
                    <a th:href="@{'/events/' + ${event.reference}}" class="block mb-4 sm:mb-0">
                        <h4 class="font-serif text-2xl font-bold" th:text="${event.groomName} + ' & ' + ${event.brideName}"></h4>
                        <p class="text-mute" th:text="'Scheduled for: ' + ${#dates.format(event.dateTime, 'dd MMM yyyy, HH:mm')}"></p>
                    </a>

                    <div class="flex items-center space-x-2">
                        <a th:href="@{'/invitations/' + ${event.reference}}" title="View Invitation"
                           class="p-2 rounded-full hover:bg-gray-100 transition"><i class="fas fa-eye text-mute"></i></a>
                        <a th:href="@{'/events/builder?eventReference=' + ${event.reference}}" title="Edit Event"
                           class="p-2 rounded-full hover:bg-gray-100 transition"><i class="fas fa-pencil-alt text-mute"></i></a>
                        <button th:attr="onclick=|copyEventUrl('${event.reference}')|" title="Copy URL"
                                class="p-2 rounded-full hover:bg-gray-100 transition"><i class="fas fa-copy text-mute"></i></button>
                        <button th:attr="onclick=|shareOnWapp('${event.reference}')|" title="Share on WhatsApp"
                                class="p-2 rounded-full hover:bg-gray-100 transition"><i class="fas fa-share-alt text-mute"></i></button>
                        <form th:action="@{'/events/' + ${event.reference} + '/delete'}" method="post" class="inline-block">
                            <button type="submit" title="Delete Event"
                                    class="p-2 rounded-full hover:bg-red-50 transition"><i class="fas fa-trash-alt text-red-500"></i></button>
                        </form>
                    </div>
                </div>
            </li>
        </ul>

        <!-- Add Event Button -->
        <div class="text-center mt-10">
            <a href="/events/builder"
               class="inline-flex items-center justify-center px-8 py-3 rounded-lg bg-accent text-white font-semibold hover:bg-opacity-90 transition">
                <i class="fas fa-plus mr-2"></i> Create New Event
            </a>
        </div>
    </section>
</main>

<script>
    function copyEventUrl(evtRef) {
        let url = window.location.origin + "/invitations/" + evtRef;
        navigator.clipboard.writeText(url).then(() => {
            alert("URL copied to clipboard!");
        }).catch(err => {
            console.error("Failed to copy URL: ", err);
        });
    }

    function shareOnWapp(evtRef) {
        let url = window.location.origin + "/invitations/" + evtRef;
        const encodedText = encodeURIComponent(url);
        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodedText}`;
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
