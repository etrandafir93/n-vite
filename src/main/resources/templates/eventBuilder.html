<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Your Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                    },
                    colors: {
                        ink: '#0f172a',      // dark text
                        mute: '#475569',     // muted
                        paper: '#fafafa',    // background
                        accent: '#111827'    // lines/accents
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-paper text-ink antialiased">
<div th:replace="~{fragments/header :: header}"></div>

<main class="min-h-screen flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-2xl bg-white rounded-2xl shadow-sm ring-1 ring-black/5 p-8 sm:p-12">
        <h1 class="font-serif text-center text-3xl md:text-4xl font-bold mb-8">Create Your Event</h1>
        <form th:action="@{/events}" method="post" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="eventReference" th:value="${eventReference}">
            <input type="hidden" id="timezone" name="timezone">

            <div>
                <label for="groomName" class="block text-sm font-semibold text-mute mb-2">Groom's Name</label>
                <input type="text" id="groomName" name="groomName" th:value="${groomName}" required
                       class="block w-full px-4 py-3 bg-paper border border-gray-200 rounded-lg focus:ring-accent focus:border-accent">
            </div>

            <div>
                <label for="brideName" class="block text-sm font-semibold text-mute mb-2">Bride's Name</label>
                <input type="text" id="brideName" name="brideName" th:value="${brideName}" required
                       class="block w-full px-4 py-3 bg-paper border border-gray-200 rounded-lg focus:ring-accent focus:border-accent">
            </div>

            <div>
                <label for="eventLocation" class="block text-sm font-semibold text-mute mb-2">Event Location</label>
                <input type="text" id="eventLocation" name="eventLocation" th:value="${eventLocation}" required
                       class="block w-full px-4 py-3 bg-paper border border-gray-200 rounded-lg focus:ring-accent focus:border-accent">
            </div>

            <div>
                <label for="eventReception" class="block text-sm font-semibold text-mute mb-2">Reception Details</label>
                <input type="text" id="eventReception" name="eventReception" th:value="${eventReception}"
                       class="block w-full px-4 py-3 bg-paper border border-gray-200 rounded-lg focus:ring-accent focus:border-accent">
            </div>

            <div>
                <label for="eventDateTime" class="block text-sm font-semibold text-mute mb-2">Date and Time</label>
                <input type="datetime-local" id="eventDateTime" name="eventDateTime" th:value="${eventDateTime}" required
                       class="block w-full px-4 py-3 bg-paper border border-gray-200 rounded-lg focus:ring-accent focus:border-accent">
            </div>
            
            <div>
                <label for="eventBackgroundImage" class="block text-sm font-semibold text-mute mb-2">Background Image</label>
                <input type="file" id="eventBackgroundImage" name="eventBackgroundImage"
                       class="block w-full text-sm text-mute file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-paper file:text-accent hover:file:bg-gray-100">
            </div>

            <div class="flex justify-center gap-4 pt-4">
                <a href="/events" class="px-8 py-3 rounded-lg border border-gray-300 text-mute font-semibold hover:bg-gray-50 transition">Cancel</a>
                <button type="submit" class="px-8 py-3 rounded-lg bg-accent text-white font-semibold hover:bg-opacity-90 transition">Save Event</button>
            </div>
        </form>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const timezoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById('timezone').value = timezoneName;
    });
</script>

</body>
</html>
