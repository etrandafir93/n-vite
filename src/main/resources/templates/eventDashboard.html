<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/list.js/2.3.1/list.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                    },
                    colors: {
                        ink: '#0f172a',      // dark text
                        mute: '#475569',     // muted
                        paper: '#fafafa',    // background
                        accent: '#111827'    // lines/accents
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-paper text-ink antialiased">
<div th:replace="~{fragments/header :: header}"></div>

<main class="min-h-screen px-4 py-10">
    <section class="w-full max-w-4xl mx-auto bg-white rounded-2xl shadow-sm ring-1 ring-black/5 p-8 sm:p-12">
        <h1 class="font-serif text-center text-3xl md:text-4xl font-bold mb-4" th:text="${event.reference().value()}"></h1>
        <p class="text-center text-mute mb-8">Here you can track your event's progress</p>

        <!-- Statistics -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center mb-10">
            <div class="p-4 rounded-lg bg-gray-50 border border-gray-200 cursor-pointer hover:bg-gray-100 transition" data-filter="ALL">
                <h3 class="text-3xl font-bold" th:text="${attendingCount}"></h3>
                <p class="text-sm text-mute">Attending</p>
            </div>
            <div class="p-4 rounded-lg bg-gray-50 border border-gray-200 cursor-pointer hover:bg-gray-100 transition" data-filter="ACCEPTED">
                <h3 class="text-3xl font-bold" th:text="${acceptedCount}"></h3>
                <p class="text-sm text-mute">Accepted</p>
            </div>
            <div class="p-4 rounded-lg bg-gray-50 border border-gray-200 cursor-pointer hover:bg-gray-100 transition" data-filter="DECLINED">
                <h3 class="text-3xl font-bold" th:text="${declinedCount}"></h3>
                <p class="text-sm text-mute">Declined</p>
            </div>
            <div class="p-4 rounded-lg bg-gray-50 border border-gray-200 cursor-pointer hover:bg-gray-100 transition" data-filter="VISITED">
                <h3 class="text-3xl font-bold" th:text="${visitedCount}"></h3>
                <p class="text-sm text-mute">Visited</p>
            </div>
        </div>

        <!-- Event List -->
        <div id="eventListContainer">
            <ul id="eventList" class="list space-y-4">
                <li th:each="event : ${eventInteractions}" 
                    class="p-4 bg-paper border border-gray-200 rounded-lg flex items-center justify-between hover:bg-gray-50 transition"
                    th:attr="data-action=${event.action}">
                    <div>
                        <h4 class="font-semibold name"
                            th:text="${event.partnerName != null ? event.guest + ' & ' + event.partnerName : event.guest}"></h4>
                        <p class="text-sm text-mute action" th:text="${#dates.format(event.timestamp, 'dd MMM yyyy, HH:mm')}"></p>
                    </div>
                    <span class="px-3 py-1 text-xs font-semibold rounded-full"
                          th:text="${event.action}"
                          th:classappend="${event.action == 'ACCEPTED' ? 'bg-green-100 text-green-800' : (event.action == 'DECLINED' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800')}">
                    </span>
                </li>
            </ul>
        </div>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const options = {
            valueNames: ['name', 'action']
        };
        const eventList = new List('eventListContainer', options);

        document.querySelectorAll('[data-filter]').forEach(counter => {
            counter.addEventListener('click', () => {
                const filter = counter.getAttribute('data-filter');
                if (filter === 'ALL') {
                    eventList.filter();
                } else {
                    eventList.filter(item => {
                        const action = item.elm.getAttribute('data-action');
                        return action && action.toUpperCase() === filter;
                    });
                }
            });
        });
    });
</script>

</body>
</html>
