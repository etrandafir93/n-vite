<th:block th:fragment="header">
    <header class="bg-white shadow-sm py-4 ring-1 ring-black/5">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a th:href="@{/events}" class="flex items-center space-x-2">
                <img th:src="@{/icons/n-vite-logo.png}" alt="N-Vite Logo" class="h-8">
                <span class="font-semibold text-lg text-ink">N-Vite</span>
            </a>

            <div th:if="${#authentication.getName().equals('anonymousUser')}">
                <button id="loginBtn" class="px-5 py-2 rounded-lg bg-accent text-white font-semibold hover:bg-opacity-90 transition">
                    Login
                </button>
            </div>

            <div th:if="${!#authentication.getName().equals('anonymousUser')}">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="px-5 py-2 rounded-lg border border-gray-300 text-mute font-semibold hover:bg-gray-50 transition">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </header>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-serif text-2xl font-bold text-ink">Welcome Back</h2>
                <button id="closeLoginModal" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <p class="text-mute mb-6">Please log in to continue.</p>
            <form th:action="@{/oauth2/authorization/google}" method="get">
                <button type="submit" class="flex items-center justify-center w-full px-4 py-3 bg-red-500 text-white font-semibold rounded-lg hover:bg-red-600 transition">
                    <img th:src="@{/icons/google.png}" alt="Google Logo" class="h-5 w-5 mr-3">
                    Sign in with Google
                </button>
            </form>
        </div>
    </div>
</th:block>
